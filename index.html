  <!DOCTYPE html>
<html>
<head>
  <title>WB Result 2026</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body{
      font-family:Arial;
      background:#f2f2f2;
      text-align:center;
      padding:20px;
    }

    .box{
      background:white;
      max-width:700px;
      margin:auto;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px rgba(0,0,0,0.2);
    }

    input{
      width:90%;
      padding:10px;
      margin:8px;
      border:1px solid #ccc;
      border-radius:5px;
    }

    button{
      padding:10px 20px;
      background:#0066cc;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
      margin-top:10px;
    }

    button:hover{
      background:#004999;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:15px;
    }

    table,th,td{
      border:1px solid black;
    }

    th,td{
      padding:8px;
      text-align:center;
    }

    .blue{
      background:#0b5ed7;
      color:white;
      padding:10px;
      margin-top:15px;
      font-weight:bold;
    }

    #captchaBox{
      font-size:22px;
      font-weight:bold;
      letter-spacing:3px;
      background:#eee;
      padding:10px;
      display:inline-block;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div class="box">

  <h2>WEST BENGAL BOARD RESULT 2026</h2>

  <p>
    Enter DOB in this format:<br>
    <b>2000-00-00</b>
  </p>

  <input type="text" id="roll" placeholder="Enter Roll Number">

  <input type="text" id="reg" placeholder="Enter Registration Number">

  <input type="text" id="dob" placeholder="YYYY-MM-DD">

  <div id="captchaBox"></div>

  <br>

  <input type="text" id="captchaInput" placeholder="Enter CAPTCHA">

  <br>

  <button onclick="checkResult()">Submit</button>

  <button onclick="downloadPDF()">Download PDF</button>

  <div id="result"></div>

</div>

<script>

function generateCaptcha(){
  let chars="ABCDEFGHJKLMNP23456789";
  let captcha="";

  for(let i=0;i<6;i++){
    captcha+=chars[Math.floor(Math.random()*chars.length)];
  }

  window.currentCaptcha=captcha;

  document.getElementById("captchaBox").innerText=captcha;
}

generateCaptcha();

const students=[

{
  roll:"104271N",
  reg:"0058",
  dob:"10-3-2010",
  name:"Soumya deep Mondal",

  marks:[
    ["First Lang",62,10,72,"A"],
    ["Second Lang",51,10,61,"A"],
    ["Math",46,10,56,"B+"],
    ["Physical Sci.",42,10,52,"B+"],
    ["Life Sci.",52,10,62,"A"],
    ["History",48,10,58,"B+"],
    ["Geog.",38,10,48,"B+"]
  ],

  totalWritten:339,
  totalProj:70,
  total:409,
  grade:"B",
  remarks:"PASS"
},

{
  roll:"104271N",
  reg:"0058",
  dob:"13-11-2009",
  name:"Mrinmoy chakraborty",

  marks:[
    {
  roll:"104271N",
  reg:"0058",
  dob:"13-11-2009",
  name:"Mrinmoy Chakraborty",

  marks:[
    ["Bengali",40,10,50,"B+"],
    ["English",55,10,65,"A"],
    ["Math",32,10,42,"B"],
    ["Physical Sci.",40,10,50,"B+"],
    ["Life Sci.",38,10,48,"B+"],
    ["History",42,10,52,"B+"],
    ["Geog.",39,10,49,"B+"]
  ],

  totalWritten:286,
  totalProj:70,
  total:356,
  grade:"B+",
  remarks:"PASS"
    }
  

  
];

function checkResult(){

  let roll=document.getElementById("roll").value.trim();

  let reg=document.getElementById("reg").value.trim();

  let dob=document.getElementById("dob").value.trim();

  let captcha=document.getElementById("captchaInput").value.trim();

  if(!/^\d{4}-\d{2}-\d{2}$/.test(dob)){
    alert("Wrong DOB format");
    return;
  }

  if(captcha!==window.currentCaptcha){
    alert("Wrong CAPTCHA");
    generateCaptcha();
    return;
  }

  let student=students.find(s=>
    s.roll===roll &&
    s.reg===reg &&
    s.dob===dob
  );

  if(!student){
    document.getElementById("result").innerHTML=
    "<h3>Result Not Found</h3>";
    return;
  }

  let html=`<div id="pdfArea">`;

  html+=`<h2>WEST BENGAL BOARD RESULT</h2>`;

  html+=`<h3>${student.name}</h3>`;

  html+=`
  <table>
    <tr>
      <th>Subject</th>
      <th>W</th>
      <th>P</th>
      <th>Total</th>
      <th>Grade</th>
    </tr>
  `;

  student.marks.forEach(m=>{

    html+=`
    <tr>
      <td>${m[0]}</td>
      <td>${m[1]}</td>
      <td>${m[2]}</td>
      <td>${m[3]}</td>
      <td>${m[4]}</td>
    </tr>
    `;
  });

  html+=`</table>`;

  html+=`

  <div class="blue">
    FINAL RESULT
  </div>

  <table>

    <tr>
      <td>Total Written</td>
      <td>${student.totalWritten}</td>
    </tr>

    <tr>
      <td>Project Marks</td>
      <td>${student.totalProj}</td>
    </tr>

    <tr>
      <td>Grand Total</td>
      <td>${student.total}</td>
    </tr>

    <tr>
      <td>Grade</td>
      <td>${student.grade}</td>
    </tr>

    <tr>
      <td>Remarks</td>
      <td>${student.remarks}</td>
    </tr>

  </table>

  </div>
  `;

  document.getElementById("result").innerHTML=html;
}

function downloadPDF(){

  let element=document.getElementById("pdfArea");

  if(!element){
    alert("First generate result");
    return;
  }

  html2pdf().set({

    margin:0.5,

    filename:"WB_Result.pdf",

    image:{
      type:"jpeg",
      quality:0.98
    },

    html2canvas:{
      scale:2
    },

    jsPDF:{
      unit:"in",
      format:"a4",
      orientation:"portrait"
    }

  }).from(element).save();
}

</script>

</body>
</html>

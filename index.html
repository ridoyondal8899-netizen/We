<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WB Result 2026</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>

body{
  font-family:Arial,sans-serif;
  background:#f2f2f2;
  text-align:center;
  margin:0;
  padding:10px;
}

.box{
  background:white;
  width:95%;
  max-width:700px;
  margin:auto;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
  color:#0b5ed7;
}

input{
  width:95%;
  padding:14px;
  margin-top:10px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:16px;
  box-sizing:border-box;
}

button{
  width:95%;
  padding:14px;
  background:#0066cc;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
  margin-top:12px;
}

button:hover{
  background:#004999;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:15px;
}

table,th,td{
  border:1px solid black;
}

th{
  background:#0b5ed7;
  color:white;
}

th,td{
  padding:10px;
  text-align:center;
}

.blue{
  background:#0b5ed7;
  color:white;
  padding:10px;
  margin-top:15px;
  font-weight:bold;
}

#captchaBox{
  font-size:28px;
  font-weight:bold;
  background:#eeeeee;
  padding:12px;
  margin-top:15px;
  border-radius:6px;
  letter-spacing:4px;
}

#result{
  margin-top:20px;
}

</style>

</head>

<body>

<div class="box">

<h2>WEST BENGAL BOARD Madhyamik RESULT 2026</h2>

<p>
Enter DOB in this format:<br>
<b>2000-00-00</b>
</p>

<input type="text" id="roll" placeholder="Enter Roll Number">

<input type="text" id="reg" placeholder="Enter Number">

<input type="text" id="dob" placeholder="YYYY-MM-DD">

<div id="captchaBox"></div>

<input type="text" id="captchaInput" placeholder="Enter CAPTCHA">

<button onclick="checkResult()">Submit</button>

<button onclick="downloadPDF()">Download PDF</button>

<div id="result"></div>

</div>

<script>

function generateCaptcha(){

  let num=Math.floor(1000 + Math.random()*9000);

  window.currentCaptcha=num.toString();

  document.getElementById("captchaBox").innerText=
  window.currentCaptcha;
}

generateCaptcha();

const students=[

{
  roll:"104271N",
  reg:"0052",
  dob:"2010-03-10",
  name:"Soumya Deep Mondal",

  marks:[
    ["First Lang",81,"A"],
    ["Second Lang",92,"AA+"],
    ["Math",88,"A+"],
    ["Physical Sci.",76,"A"],
    ["Life Sci.",85,"A+"],
    ["History",86,"A+"],
    ["Geog.",76,"A"]
  ],

  total:584,
  grade:"AA",
  remarks:"PASS"
},

{
  roll:"104271N",
  reg:"0058",
  dob:"2009-11-13",
  name:"Mrinmoy Chakraborty",

  marks:[
    ["Bengali",50,"B+"],
    ["English",63,"A"],
    ["Math",42,"B"],
    ["Physical Sci.",50,"B+"],
    ["Life Sci.",48,"B+"],
    ["History",49,"B+"],
    ["Geog.",47,"B+"]
  ],

  total:349,
  grade:"B+",
  remarks:"PASS"
}

];

function checkResult(){

  let roll=document.getElementById("roll").value.trim();

  let reg=document.getElementById("reg").value.trim();

  let dob=document.getElementById("dob").value.trim();

  let captcha=document.getElementById("captchaInput").value.trim();

  if(!/^\d{4}-\d{2}-\d{2}$/.test(dob)){
    alert("Wrong DOB Format");
    return;
  }

  if(captcha!==window.currentCaptcha){
    alert("Wrong CAPTCHA");
    generateCaptcha();
    return;
  }

  let student=students.find(s=>
    s.roll===roll &&
    s.reg===reg &&
    s.dob===dob
  );

  if(!student){

    document.getElementById("result").innerHTML=
    "<h3>Result Not Found</h3>";

    generateCaptcha();

    return;
  }

  let html=`<div id="pdfArea">`;

  html+=`<h2>WEST BENGAL BOARD RESULT</h2>`;

  html+=`<h3>${student.name}</h3>`;

  html+=`

  <table>

    <tr>
      <th>Subject</th>
      <th>Marks</th>
      <th>Grade</th>
    </tr>

  `;

  student.marks.forEach(m=>{

    html+=`

    <tr>
      <td>${m[0]}</td>
      <td>${m[1]}</td>
      <td>${m[2]}</td>
    </tr>

    `;
  });

  html+=`</table>`;

  html+=`

  <div class="blue">
    FINAL RESULT
  </div>

  <table>

    <tr>
      <th>Total Marks</th>
      <th>Grade</th>
      <th>Remarks</th>
    </tr>

    <tr>
      <td>${student.total}</td>
      <td>${student.grade}</td>
      <td>${student.remarks}</td>
    </tr>

  </table>

  </div>

  `;

  document.getElementById("result").innerHTML=html;

  generateCaptcha();
}

function downloadPDF(){

  let element=document.getElementById("pdfArea");

  if(!element){
    alert("First Generate Result");
    return;
  }

  html2pdf().set({

    margin:0.5,

    filename:"WB_Result.pdf",

    image:{
      type:"jpeg",
      quality:0.98
    },

    html2canvas:{
      scale:2
    },

    jsPDF:{
      unit:"in",
      format:"a4",
      orientation:"portrait"
    }

  }).from(element).save();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WB Result</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
  font-family: Arial;
  text-align:center;
  background:#f2f2f2;
  margin:0;
}

.box{
  background:white;
  width:95%;
  max-width:420px;
  margin:20px auto;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 12px rgba(0,0,0,0.15);
}

input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:1px solid #ccc;
  border-radius:6px;
}

button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  background:#1e6ba8;
  color:white;
  font-size:15px;
}

button:hover{
  background:#15507d;
}

#captchaBox{
  font-weight:bold;
  font-size:18px;
  letter-spacing:4px;
  background:#eee;
  display:inline-block;
  padding:8px 14px;
  border-radius:6px;
  margin:8px 0;
}

.note{
  font-size:12px;
  color:#555;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  font-size:14px;
}

th,td{
  border:1px solid #ddd;
  padding:8px;
  text-align:center;
}

th{
  background:#333;
  color:white;
}

.blue{
  background:#1e6ba8;
  color:white;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
  <h3>WB Student madhyamik Result 2026 </h3>

  <input type="text" id="roll" placeholder="Enter Roll No">
  <input type="text" id="reg" placeholder="Enter Number">

  <input type="text" id="dob" placeholder="YYYY-MM-DD">

  <div id="captchaBox"></div>
  <p class="note">Enter CAPTCHA exactly</p>

  <button onclick="generateCaptcha()">Refresh CAPTCHA</button>

  <input type="text" id="captchaInput" placeholder="Enter Captcha">

  <button onclick="checkResult()">Submit</button>

  <button onclick="downloadPDF()">Download PDF</button>

  <div id="result"></div>
</div>

<script>

// CAPTCHA
function generateCaptcha(){
  let chars="ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789";
  let c="";
  for(let i=0;i<6;i++){
    c+=chars.charAt(Math.floor(Math.random()*chars.length));
  }
  document.getElementById("captchaBox").innerText=c;
  window.currentCaptcha=c;
}

window.onload=generateCaptcha;

// DATABASE
const students=[
{
  roll:"10271N",
  reg:"0052",
  dob:"2010-03-10",
  name:"Soumya Deep Mondal",
  marks:[
    ["first lenguage",62,10,72,"A"],
    ["second language",51,10,61,"A"],
    ["Math",46,10,56,"B+"],
    ["Phy. Sc.",42,10,52,"B+"],
    ["Life Sc.",52,10,62,"A"],
    ["History",48,10,58,"B+"],
    ["Geog.",38,10,48,"B+"]
  ],
  totalWritten:339,
  totalProj:70,
  total:409,
  grade:"B",
  remarks:"PASS"
}
];

{
  roll:"104271N",
  reg:"0058",
  dob:"2000-00-00",
  name:"Mrinmoy chakraborty",
  marks:[
    ["First Lang",40,10,50,"B"],
    ["Second Lang",55,10,65,"A"],
    ["Math",32,10,42,"B"],
    ["Physical Sci.",40,10,50,"B"],
    ["Life Sci.",38,10,48,"B+"],
    ["History",42,10,52,"B"],
    ["Geog.",39,10,49,"B+"]
  ],
  totalWritten:286,
  totalProj:70,
  total:356,
  grade:"B",
  remarks:"PASS"
}

function checkResult(){
  let roll=document.getElementById("roll").value;
  let reg=document.getElementById("reg").value;
  let dob=document.getElementById("dob").value;
  let captcha=document.getElementById("captchaInput").value;

  if(!/^\d{4}-\d{2}-\d{2}$/.test(dob)){
    alert("Wrong DOB format");
    return;
  }

  if(captcha !== window.currentCaptcha){
    alert("Wrong captcha");
    generateCaptcha();
    return;
  }

  let student=students.find(s=>
    s.roll===roll && s.reg===reg && s.dob===dob
  );

  if(!student){
    document.getElementById("result").innerHTML="Result not found";
    return;
  }

  let html=`<div id="pdfArea">`;

  html+=`<h4>${student.name}</h4>`;

  html+=`<table>
  <tr><th>Subject</th><th>W</th><th>P</th><th>T</th><th>G</th></tr>`;

  student.marks.forEach(m=>{
    html+=`<tr>
      <td>${m[0]}</td>
      <td>${m[1]}</td>
      <td>${m[2]}</td>
      <td>${m[3]}</td>
      <td>${m[4]}</td>
    </tr>`;
  });

  html+=`</table>

  <div class="blue">FINAL RESULT</div>

  <table>
    <tr><td>Total</td><td>${student.total}</td></tr>
    <tr><td>Grade</td><td>${student.grade}</td></tr>
    <tr><td>Remarks</td><td>${student.remarks}</td></tr>
  </table>

  </div>`;

  document.getElementById("result").innerHTML=html;
}

// PDF DOWNLOAD
function downloadPDF(){
  let element=document.getElementById("pdfArea");

  if(!element){
    alert("First generate result");
    return;
  }

  html2pdf().set({
    margin:0.5,
    filename:"WB_Result.pdf",
    image:{type:"jpeg",quality:0.98},
    html2canvas:{scale:2},
    jsPDF:{unit:"in",format:"a4",orientation:"portrait"}
  }).from(element).save();
}

</script>

</body>
</html>
